<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="48" x2="0" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Rising bars -->
  <rect x="12" y="36" width="8" height="16" rx="2" fill="url(#bar)" opacity="0.7"/>
  <rect x="24" y="28" width="8" height="24" rx="2" fill="url(#bar)" opacity="0.85"/>
  <rect x="36" y="20" width="8" height="32" rx="2" fill="url(#bar)" opacity="0.95"/>
  <!-- Accent dot (hub) -->
  <circle cx="50" cy="16" r="5" fill="#fbbf24"/>
  <!-- Connecting line from top bar to dot -->
  <line x1="40" y1="20" x2="46" y2="18" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
